# ============================================================
# Beautiful Boot x Ventoy  -  User Configuration
#
# Copy this file to:  <USB>/ventoy/beautyboot.cfg
# Edit the values below to personalise your splash screen.
# ============================================================

# --- Splash text (two lines, Apple ][ style) ---
set BB_LINE1="* * *  B E A U T Y B O O T  * * *"
set BB_LINE2="    Loading Ventoy ...            "

# --- How many seconds to show the splash (default: 3) ---
set BB_SPLASH_SEC=3

# --- Message shown when an ISO is selected (Phase 3) ---
set BB_EXIT_MSG=">> Launching selected system ..."
