# ============================================================
# BeautyBoot  —  Pre-menu meteor animation
# source'd from EFI grub.cfg before vt_list_img
# Frames: $vtoy_iso_part/ventoy/phase0/frame_00.png ... frame_17.png
# ============================================================

# 確保 gfxterm 已啟動
terminal_output gfxterm

# 封面：黑幕帶標題
if [ -f $vtoy_iso_part/ventoy/theme/beautyboot/background.png ]; then
    background_image $vtoy_iso_part/ventoy/theme/beautyboot/background.png
fi

# 加載每一幀 frame（80.18s * 18 = ~3s）
for frame in 00 01 02 03 04 05 06 07 08 09 10 11 12 13 14 15 16 17; do
    if [ -f $vtoy_iso_part/ventoy/phase0/frame_${frame}.png ]; then
        background_image $vtoy_iso_part/ventoy/phase0/frame_${frame}.png
        sleep 0.18
    fi
done

# 最後回到主背景
if [ -f $vtoy_iso_part/ventoy/theme/beautyboot/background.png ]; then
    background_image $vtoy_iso_part/ventoy/theme/beautyboot/background.png
fi
