# ============================================================
# Beautiful Boot x Ventoy  -  ventoy_grub.cfg
# Copy to:  <USB>/ventoy/ventoy_grub.cfg
# ============================================================

# ---- Phase 0: Meteor animation (GRUB PNG frames, no EFI needed) ----
if [ -f $vt_plugin_path/ventoy/beautyboot_phase0.cfg ]; then
    source $vt_plugin_path/ventoy/beautyboot_phase0.cfg
fi

# ---- Phase 1: Splash screen ----
configfile $vt_plugin_path/ventoy/beautyboot_splash.cfg

# ---- Phase 3: Exit transition function ----
if [ -f $vt_plugin_path/ventoy/beautyboot_exit.cfg ]; then
    source $vt_plugin_path/ventoy/beautyboot_exit.cfg
fi
